apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: webapp-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: hashicorp/http-echo
        args:
        - "-text=Hello from BACKEND"
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: webapp-demo
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 5678
